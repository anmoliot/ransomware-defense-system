apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ransomware-defense-backend
spec:
  minReplicas: 2
  maxReplicas: 6
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ransomware-defense-backend
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
